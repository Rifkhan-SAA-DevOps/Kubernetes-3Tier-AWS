name: Build and Push Library Docker Images

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  BACKEND_IMAGE: library-backend
  FRONTEND_IMAGE: library-frontend

jobs:
  build-and-push:
    name: Build and Push Backend and Frontend Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/library-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/library-backend:sha-${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/library-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/library-frontend:sha-${{ github.sha }}
