apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: three-tier-app

spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:  # pod
      containers:
        - name: frontend
          image: frontend-three-tier-app:v1
          ports:
            - containerPort: 80



           